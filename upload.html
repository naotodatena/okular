<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Offer - Dexie.Option</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/app.js"></script>
</head>
<body>
    <header>
        <div class="logo">
            <span style="font-size: 1.8rem;">D</span>exie.Option
        </div>
        <nav>
            <a href="index.html">Offers</a>
            <a href="upload.html" class="btn-primary">Upload Offer</a>
        </nav>
    </header>
    <main class="container">
        <div style="text-align: center; margin-bottom: 3rem;">
            <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem;">Upload New Offer</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Submit your Chia offer string to the tracker.</p>
        </div>

        <div class="upload-form">
            <form id="upload-form" action="#">
                <div class="form-group">
                    <label for="offer_string">Offer String</label>
                    <textarea name="offer_string" id="offer_string" placeholder="Paste your offer string starting with 'offer1...'"></textarea>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem;">The offer will be enriched with metadata after submission.</p>
                </div>
                
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <button type="submit" class="btn-primary" style="padding: 1rem 2.5rem; font-size: 1.1rem; flex-grow: 1;">Submit Offer</button>
                    <a href="index.html" style="color: var(--text-muted); padding: 0 1rem; font-weight: 500;">Cancel</a>
                </div>
            </form>
        </div>
    </main>
    <footer style="margin-top: 5rem; padding: 2rem; border-top: 1px solid var(--card-border); text-align: center; color: var(--text-muted); font-size: 0.8rem;">
        &copy; 2026 Dexie.Option - Chia Offer Tracking Dashboard
    </footer>
</body>
</html>
